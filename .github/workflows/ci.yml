# CI — XOOPS module DevOps baseline.
# Profile: XoopsCore27 / PHP 8.2+
# xoops-overlay:profile=core27
#
# Self-contained quality gate: runs coding standards and static analysis on the minimum PHP
# version, then runs PHPUnit on the full supported PHP matrix. Rector remains available as an
# explicit modernization command rather than blocking maintenance changes on unrelated legacy
# transformations. When the org hosts a shared reusable workflow you can
# replace this whole job with:
#   uses: XoopsModules27x/.github/.github/workflows/module-ci.yml@v1
name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  qa:
    name: QA (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Coding standards
        if: matrix.php == '8.2'
        run: composer cs:check

      - name: Static analysis
        if: matrix.php == '8.2'
        run: composer analyse

      - name: Unit tests
        run: composer test
